/* ===================== Helpers ===================== */
const uid = () => (typeof crypto !== "undefined" && crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
const numify = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const fmt = (n) => (n == null || isNaN(n) ? "0" : Math.round(n).toLocaleString("en-US"));
const cur = (n, c) => `${c} ${fmt(n)}`;
const perMonth = (amt, freq) => numify(amt) / (FREQ[freq]?.div || 1);
const monthsUntil = (s) => { if (!s) return null; const now = new Date(), d = new Date(s); return (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth()); };
const fmtDate = (s) => { if (!s) return "—"; const d = new Date(s); return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`; };
const fmtMonth = (s) => { if (!s) return ""; const d = new Date(s); return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}`; };
const ymIdx = (y, m) => y * 12 + (m - 1);
const activeRange = (start, end, y, m) => { const idx = ymIdx(y, m); if (start) { const d = new Date(start); if (idx < ymIdx(d.getFullYear(), d.getMonth() + 1)) return false; } if (end) { const d = new Date(end); if (idx > ymIdx(d.getFullYear(), d.getMonth() + 1)) return false; } return true; };
const countdownText = (s) => { const m = monthsUntil(s); if (m == null) return null; if (m < 0) return "已完成"; if (m === 0) return "本月"; if (m < 12) return `還剩 ${m} 個月`; const y = Math.floor(m / 12), mm = m % 12; return `還剩 ${y} 年${mm ? ` ${mm} 個月` : ""}`; };
const todayISO = () => new Date().toISOString().slice(0, 10);
const ymOf = (y, m) => `${y}-${String(m).padStart(2, "0")}`;
const dueMonthsOf = (freq, anchor) => { const n = FREQ[freq]?.n || 12; if (n === 12) return null; const step = 12 / n; const set = []; for (let k = 0; k < n; k++) set.push(((anchor - 1 + k * step) % 12) + 1); return set; };
const isDue = (freq, anchor, month) => { const dm = dueMonthsOf(freq, anchor); return dm === null ? true : dm.includes(month); };

/* Build flat payable / receivable lines from the data */
function buildLines(data) {
  const ex = [], inc = [];
  data.properties.forEach((p) => {
    const lc = p.loan?.currency || "HKD";
    if (numify(p.loan?.monthly) > 0) ex.push({ key: `p:${p.id}:loan`, cat: "物業", name: `${p.name} · 房貸`, currency: lc, amount: numify(p.loan.monthly), freq: "monthly", anchor: 1, account: p.loan.account || "" });
    (p.costs || []).forEach((c) => {
      const freq = c.freq || "monthly";
      const anchor = c.dueMonth || (p.loan?.start ? new Date(p.loan.start).getMonth() + 1 : 1);
      ex.push({ key: `p:${p.id}:c:${c.id}`, cat: "物業", name: `${p.name} · ${c.label}`, currency: c.currency, amount: numify(c.amount), freq, anchor, account: c.account || "" });
    });
  });
  data.insurances.forEach((i) => { const anchor = i.start ? new Date(i.start).getMonth() + 1 : 1; ex.push({ key: `ins:${i.id}`, cat: "保險", name: i.name, currency: i.currency, amount: numify(i.premium), freq: i.frequency || "annual", anchor, account: i.account || "" }); });
  data.debts.forEach((d) => ex.push({ key: `debt:${d.id}`, cat: "負債", name: d.name, currency: d.currency, amount: numify(d.monthly), freq: "monthly", anchor: 1, account: d.account || "" }));
  data.subscriptions.forEach((s) => ex.push({ key: `sub:${s.id}`, cat: "固定費", name: s.name, currency: s.currency, amount: numify(s.amount), freq: s.cycle || "monthly", anchor: 1, account: s.account || "" }));
  (data.living || []).forEach((x) => ex.push({ key: `liv:${x.id}`, cat: "生活費", name: x.name, currency: x.currency, amount: numify(x.amount), freq: x.cycle || "monthly", anchor: 1, account: x.account || "" }));
  data.incomes.forEach((i) => inc.push({ key: `inc:${i.id}`, cat: "收入", name: i.name, currency: i.currency, amount: numify(i.amount), freq: i.cycle || "monthly", anchor: 1, start: i.start || "", end: i.end || "", account: i.account || "" }));
  return { ex, inc };
}

function AssetTrend({ history, base, latest, onMark }) {
  const pts = [...(history || [])].sort((a, b) => a.date.localeCompare(b.date));
  return (
    <div className="card" style={{ padding: 20, gridColumn: "1 / -1", marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><TrendingUp size={17} color={T.brass} /><div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600 }}>資產走勢</div></div>
        <button className="btn-ghost" style={{ padding: "6px 11px", fontSize: 12.5 }} onClick={onMark}>記錄今天</button>
      </div>
      {pts.length < 2 ? (
        <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, marginTop: 12 }}>{pts.length === 0 ? "還沒有紀錄。改一次帳戶餘額,或按「記錄今天」,就會開始畫走勢線。" : `已記錄 1 筆(${pts[0].date} · ${base} ${fmt(pts[0].total)})。改天再記一次就會連成走勢線。`}</div>
      ) : (() => {
        const vals = pts.map((p) => p.total);
        let min = Math.min(...vals), max = Math.max(...vals);
        if (min === max) { const pad = Math.abs(min) * 0.05 || 1; min -= pad; max += pad; }
        const X = (i) => (i / (pts.length - 1)) * 100;
        const Y = (v) => (1 - (v - min) / (max - min)) * 100;
        const line = pts.map((p, i) => `${i ? "L" : "M"}${X(i).toFixed(2)},${Y(p.total).toFixed(2)}`).join(" ");
        const area = `${line} L100,100 L0,100 Z`;
        return (
          <div>
            <div style={{ position: "relative", height: 190, marginTop: 14 }}>
              <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
                <path d={area} fill={T.forestSoft} opacity={0.5} />
                <path d={line} fill="none" stroke={T.forest} strokeWidth={2.5} vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round" />
              </svg>
              {pts.map((p, i) => <div key={p.date} title={`${p.date} · ${base} ${fmt(p.total)}`} style={{ position: "absolute", left: `${X(i)}%`, top: `${Y(p.total)}%`, width: 8, height: 8, borderRadius: "50%", background: T.surface, border: `2px solid ${T.forest}`, transform: "translate(-50%,-50%)" }} />)}
              <div style={{ position: "absolute", top: 0, left: 2, fontFamily: T.sans, fontSize: 10.5, color: T.muted }}>{base} {fmt(max)}</div>
              <div style={{ position: "absolute", bottom: 0, left: 2, fontFamily: T.sans, fontSize: 10.5, color: T.muted }}>{base} {fmt(min)}</div>

              <span>{pts[0].date}</span><span>最新 {base} {fmt(latest)} · {pts[pts.length - 1].date}</span>
            </div>
          </div>
        );
      })()}

  );
}
function MoneyInput({ value, onCommit, style, className }) {
  const [local, setLocal] = useState(value == null || value === "" ? "" : String(value));

  useEffect(() => { if (!focused.current) setLocal(value == null || value === "" ? "" : String(value)); }, [value]);

  return <input type="text" inputMode="decimal" className={className} value={local} style={style}
    onFocus={() => { focused.current = true; }}
    onChange={(e) => setLocal(e.target.value.replace(/[^0-9.]/g, ""))}
    onBlur={commit}
    onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); }} />;
}

function Donut({ slices, total, label, baseLabel }) {
  if (!slices.length || total <= 0) return <div style={{ display: "grid", placeItems: "center", height: 180 }}><div style={{ width: 150, height: 150, borderRadius: "50%", border: `18px solid ${T.surfaceAlt}` }} /></div>;

}

  }, []);

    if (user === undefined) return;            // still checking auth

    (async () => {
      try {
        const snap = await getDoc(doc(fbDb, "users", user.uid));
        if (snap.exists() && snap.data().json) {
          const o = JSON.parse(snap.data().json);
          setData({ ...EMPTY, ...o, settings: { ...EMPTY.settings, ...(o.settings || {}), rates: { ...EMPTY.settings.rates, ...((o.settings || {}).rates || {}) } }, living: o.living || [], oneoffs: o.oneoffs || [], accounts: o.accounts || [], transfers: o.transfers || [], assetHistory: o.assetHistory || [], payments: o.payments || {}, forecasts: o.forecasts || {} });
        } else { setData(EMPTY); }
      } catch (e) { console.error(e); }
      setLoading(false);
    })();
  }, [user]);

  const login = () => signInWithPopup(fbAuth, googleProvider).catch((e) => window.alert("登入失敗:" + (e && e.message ? e.message : e)));
  const logout = () => { if (window.confirm("登出?(資料已存在雲端,下次登入會回來)")) signOut(fbAuth); };

  const syncRef = useRef(null);
  const cloudSave = (next) => {
    const u = fbAuth.currentUser; if (!u) return;
    clearTimeout(syncRef.current);
    syncRef.current = setTimeout(() => {
      setDoc(doc(fbDb, "users", u.uid), { json: JSON.stringify(next), updatedAt: Date.now() }).catch((e) => console.error(e));
    }, 700);
  };
  const persist = (next) => { setData(next); cloudSave(next); };

  // Fetch today's exchange rates (best effort; falls back to manual rates if blocked/offline)
  const refreshRates = async (silent) => {
    if (!silent) setFxStatus("loading");
    try {
      const res = await fetch("https://open.er-api.com/v6/latest/HKD");
      const j = await res.json();
      if (j && j.rates) {
        setData((prev) => {
          const r = { ...prev.settings.rates, HKD: 1 };
          CUR_LIST.forEach((c) => { if (c === "HKD") return; const v = j.rates[c]; if (v) r[c] = +(1 / v).toFixed(4); });
          const next = { ...prev, settings: { ...prev.settings, rates: r, ratesUpdatedAt: j.time_last_update_utc || new Date().toISOString() } };
          cloudSave(next);
          return next;
        });
        setFxStatus("ok");
      } else setFxStatus("error");
    } catch (e) { setFxStatus("error"); }
  };
  useEffect(() => { if (!loading) refreshRates(true); /* eslint-disable-next-line */ }, [loading]);

  const base = data.settings.base;
  const rates = data.settings.rates;
  const tb = (amt, c) => numify(amt) * (rates[c] || 1) / (rates[base] || 1);
  const bMoney = (n) => `${base} ${fmt(n)}`;
  const acctNames = (data.accounts && data.accounts.length ? data.accounts.map((a) => a.name).filter(Boolean) : DEFAULT_ACCT_NAMES);
  const totalAssets = (data.accounts || []).reduce((s, a) => s + tb(a.balance, a.currency), 0);
  const totalDiff = (data.accounts || []).reduce((s, a) => s + (a.baseline != null ? tb(numify(a.balance) - numify(a.baseline), a.currency) : 0), 0);
  const lines = useMemo(() => buildLines(data), [data]);
  // base value of a recorded payment, using the rate locked in at record time when present
  const paidBase = (rec, currency) => numify(rec.amount) * (rec.rate != null ? rec.rate : (rates[currency] || 1)) / (rates[base] || 1);

  /* ----- dashboard totals ----- */
  const M = useMemo(() => {
    const catEx = { 物業: 0, 保險: 0, 負債: 0, 固定費: 0, 生活費: 0 };
    const byCur = {}, byCurInc = {};
    lines.ex.forEach((l) => { const mb = tb(perMonth(l.amount, l.freq), l.currency); catEx[l.cat] += mb; byCur[l.currency] = (byCur[l.currency] || 0) + perMonth(l.amount, l.freq); });
    const nowY = now.getFullYear(), nowM = now.getMonth() + 1;
    const acct = {};
    const ensureA = (a) => { const k = (a && a.trim()) || "未指定"; if (!acct[k]) acct[k] = { inBase: 0, outBase: 0, inCur: {}, outCur: {} }; return acct[k]; };
    lines.inc.forEach((l) => {
      if (!activeRange(l.start, l.end, nowY, nowM)) return;
      const m = perMonth(l.amount, l.freq);
      byCurInc[l.currency] = (byCurInc[l.currency] || 0) + m;
      const A = ensureA(l.account); A.inBase += tb(m, l.currency); A.inCur[l.currency] = (A.inCur[l.currency] || 0) + m;
    });
    lines.ex.forEach((l) => {
      const m = perMonth(l.amount, l.freq);
      const A = ensureA(l.account); A.outBase += tb(m, l.currency); A.outCur[l.currency] = (A.outCur[l.currency] || 0) + m;
    });
    const income = lines.inc.reduce((s, l) => s + (activeRange(l.start, l.end, nowY, nowM) ? tb(perMonth(l.amount, l.freq), l.currency) : 0), 0);
    const expense = EXP_CATS.reduce((s, c) => s + catEx[c], 0);
    const debtTotal = data.properties.reduce((s, p) => s + tb(p.loan?.principal, p.loan?.currency || "HKD") + (p.costs || []).reduce((a, c) => a + (c.isLoan ? tb(c.principal, c.currency) : 0), 0), 0) + data.debts.reduce((s, d) => s + tb(d.balance, d.currency), 0);
    return { catEx, byCur, byCurInc, acct, income, expense, balance: income - expense, debtTotal };
  }, [data, lines]);

  const catSlices = useMemo(() => EXP_CATS.map((c) => ({ name: c, value: M.catEx[c], color: CAT_COLOR[c] })).filter((x) => x.value > 0), [M]);

  const milestones = useMemo(() => {
    const arr = [];
    data.properties.forEach((p) => { if (p.loan?.end) arr.push({ name: p.name, sub: "房貸還清", date: p.loan.end, color: T.forest, bg: T.forestSoft }); });
    data.debts.forEach((d) => { if (d.end) arr.push({ name: d.name, sub: "還清", date: d.end, color: T.neg, bg: "#F6E2DB" }); });
    data.insurances.forEach((i) => { if (i.end) arr.push({ name: i.name, sub: "繳費期滿", date: i.end, color: T.brass, bg: T.brassSoft }); });
    return arr.map((x) => ({ ...x, m: monthsUntil(x.date) })).filter((x) => x.m != null).sort((a, b) => a.m - b.m).slice(0, 8);
  }, [data]);

  const isEmpty = !data.properties.length && !data.insurances.length && !data.debts.length && !data.incomes.length && !data.subscriptions.length;

  /* ----- CRUD ----- */
  const defaults = {
    property: { name: "", region: "", loan: { currency: "HKD", principal: "", rate: "", monthly: "", start: "", end: "", account: "" }, costs: [] },

    debt: { name: "", kind: "信用卡", currency: "HKD", balance: "", monthly: "", end: "", account: "" },

  const titles = { property: "物業", insurance: "保險", debt: "負債", income: "收入來源", subscription: "固定費 / 訂閱", living: "生活費", oneoff: "臨時支出", account: "帳戶 / 資產", transfer: "轉賬 / 提現 / 存入" };

  const setCost = (i, k, v) => setForm((f) => { const costs = [...f.costs]; costs[i] = { ...costs[i], [k]: v }; return { ...f, costs }; });
  const delCost = (i) => setForm((f) => ({ ...f, costs: f.costs.filter((_, idx) => idx !== i) }));

  const canSubmit = !!modal && (

    (modal.type === "living" && !!form.name?.trim() && numify(form.amount) > 0) ||
    (modal.type === "oneoff" && !!form.name?.trim() && numify(form.amount) > 0 && !!form.date) ||
    (modal.type === "account" && !!form.name?.trim()) ||
    (modal.type === "transfer" && !!form.from && !!form.to && form.from !== form.to && numify(form.amount) > 0)
  );

  const submit = () => {
    if (!canSubmit) return;
    const t = modal.type, coll = collOf[t];
    let rec = { ...form, name: (form.name || "").trim() };
    if (t === "property") {
      rec.loan = { ...form.loan, principal: numify(form.loan.principal), rate: numify(form.loan.rate), monthly: numify(form.loan.monthly) };
      rec.costs = (form.costs || []).filter((c) => c.label && c.label.trim() && numify(c.amount) > 0).map((c) => {
        const o = { id: c.id || uid(), label: c.label.trim(), currency: c.currency, amount: numify(c.amount), freq: c.freq || "monthly" };
        if (o.freq !== "monthly" && c.dueMonth) o.dueMonth = parseInt(c.dueMonth, 10) || undefined;
        if (c.account && c.account.trim()) o.account = c.account.trim();
        if (c.isLoan) { o.isLoan = true; o.principal = numify(c.principal); o.rate = numify(c.rate); if (c.end) o.end = c.end; }
        return o;
      });
    }
    if (t === "insurance") rec.premium = numify(form.premium);
    if (t === "debt") { rec.balance = numify(form.balance); rec.monthly = numify(form.monthly); }
    if (t === "income" || t === "subscription" || t === "living" || t === "oneoff") rec.amount = numify(form.amount);
    if (t === "account") { rec.balance = numify(form.balance); rec.baseline = (form.baseline == null || form.baseline === "") ? rec.balance : numify(form.baseline); }
    if (t === "transfer") {
      rec.amount = numify(form.amount);
      if (!rec.name) rec.name = `${form.from} → ${form.to}`;
      const fromA = (data.accounts || []).find((a) => a.name === rec.from);
      const toA = (data.accounts || []).find((a) => a.name === rec.to);
      rec.fromDelta = fromA ? round2(conv(rec.amount, rec.currency, fromA.currency)) : 0;
      rec.toDelta = toA ? round2(conv(rec.amount, rec.currency, toA.currency)) : 0;
    }
    const list = modal.id ? data[coll].map((x) => (x.id === modal.id ? { ...rec, id: modal.id } : x)) : [...data[coll], { ...rec, id: uid() }];
    let nextData = { ...data, [coll]: list };
    if (t === "account") nextData.assetHistory = snapshotAssets(list, data);
    if (t === "transfer") {
      let accts = data.accounts || [];
      if (modal.id) { const old = (data.transfers || []).find((x) => x.id === modal.id); if (old) accts = applyDeltas(accts, old, -1); }
      accts = applyDeltas(accts, rec, +1);
      nextData.accounts = accts;
    }
    persist(nextData);
    close();
  };
  const conv = (amt, from, to) => numify(amt) * (rates[from] || 1) / (rates[to] || 1);
  const round2 = (n) => Math.round(n * 100) / 100;
  const applyDeltas = (accounts, tr, sign) => (accounts || []).map((a) => {
    if (a.name === tr.from) { const d = sign * (tr.fromDelta || 0); return { ...a, balance: round2(numify(a.balance) - d), baseline: a.baseline == null ? a.baseline : round2(numify(a.baseline) - d) }; }
    if (a.name === tr.to) { const d = sign * (tr.toDelta || 0); return { ...a, balance: round2(numify(a.balance) + d), baseline: a.baseline == null ? a.baseline : round2(numify(a.baseline) + d) }; }
    return a;
  });
  const reconcileAccount = (id) => persist({ ...data, accounts: data.accounts.map((a) => a.id === id ? { ...a, baseline: numify(a.balance) } : a) });
  const snapshotAssets = (accounts, prevData) => {
    const today = todayISO();
    const total = (accounts || []).reduce((s, a) => s + numify(a.balance) * (rates[a.currency] || 1) / (rates[base] || 1), 0);
    const hist = (prevData.assetHistory || []).filter((h) => h.date !== today);
    hist.push({ date: today, total });
    hist.sort((a, b) => a.date.localeCompare(b.date));
    return hist;
  };
  const markAssetsToday = () => persist({ ...data, assetHistory: snapshotAssets(data.accounts, data) });
  const remove = (t, id) => { if (window.confirm("確定要刪除這筆資料嗎?")) { if (t === "transfer") { const tr = (data.transfers || []).find((x) => x.id === id); persist({ ...data, transfers: data.transfers.filter((x) => x.id !== id), accounts: tr ? applyDeltas(data.accounts, tr, -1) : data.accounts }); return; } const list = data[collOf[t]].filter((x) => x.id !== id); const nd = { ...data, [collOf[t]]: list }; if (t === "account") nd.assetHistory = snapshotAssets(list, data); persist(nd); } };

  const setRate = (c, v) => persist({ ...data, settings: { ...data.settings, rates: { ...data.settings.rates, [c]: parseFloat(v) || 0 } } });
  const setBase = (v) => persist({ ...data, settings: { ...data.settings, base: v } });

  /* ----- monthly payment records ----- */
  const ym = ymOf(curY, curM);
  const monthRec = data.payments[ym] || {};
  const togglePaid = (line) => {
    const recCur = data.payments[ym] || {};
    const next = { ...recCur };
    if (next[line.key]) delete next[line.key]; else next[line.key] = { amount: line.amount, date: line.date || todayISO(), rate: rates[line.currency] || 1 };
    persist({ ...data, payments: { ...data.payments, [ym]: next } });
  };
  const editPaid = (line, k, v) => {
    const recCur = data.payments[ym] || {};
    if (!recCur[line.key]) return;
    const val = k === "amount" ? (parseFloat(v) || 0) : v;
    persist({ ...data, payments: { ...data.payments, [ym]: { ...recCur, [line.key]: { ...recCur[line.key], [k]: val } } } });
  };
  const stepMonth = (d) => { let m = curM + d, y = curY; if (m < 1) { m = 12; y--; } if (m > 12) { m = 1; y++; } setCurM(m); setCurY(y); };

  /* ----- forecast ----- */
  const setForecast = (cat, v) => persist({ ...data, forecasts: { ...data.forecasts, [fcYear]: { ...(data.forecasts[fcYear] || {}), [cat]: parseFloat(v) || 0 } } });

  const exportData = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `財務備份_${todayISO()}.json`; a.click(); URL.revokeObjectURL(url); };
  const importData = (e) => { const file = e.target.files?.[0]; if (!file) return; const reader = new FileReader(); reader.onload = () => { try { const o = JSON.parse(reader.result); persist({ ...EMPTY, ...o, settings: { ...EMPTY.settings, ...(o.settings || {}), rates: { ...EMPTY.settings.rates, ...((o.settings || {}).rates || {}) } }, living: o.living || [], oneoffs: o.oneoffs || [], accounts: o.accounts || [], transfers: o.transfers || [], assetHistory: o.assetHistory || [], payments: o.payments || {}, forecasts: o.forecasts || {} }); } catch { window.alert("檔案格式不正確"); } }; reader.readAsText(file); e.target.value = ""; };

  const TABS = [
    { key: "overview", label: "總覽", icon: LayoutGrid },
    { key: "monthly", label: "每月對帳", icon: CalendarCheck },
    { key: "annual", label: "年度預測", icon: Target },
    { key: "properties", label: "物業", icon: Building2 },
    { key: "insurance", label: "保險", icon: Shield },
    { key: "debts", label: "負債", icon: CreditCard },
    { key: "income", label: "收入", icon: Coins },
    { key: "subscriptions", label: "固定費", icon: Repeat },
    { key: "living", label: "生活費", icon: ShoppingBag },
    { key: "oneoff", label: "臨時", icon: Receipt },
    { key: "assets", label: "資產", icon: Landmark },
  ];

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;600&display=swap');
    .fin * { box-sizing: border-box; }

      <style>{css}</style>

                <ChevronDown size={18} color={T.muted} style={{ transform: showFx ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
              </button>
              {showFx && (
                <div style={{ padding: "0 18px 18px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
                    <span style={{ fontFamily: T.sans, fontSize: 13, color: T.inkSoft, fontWeight: 600 }}>基準貨幣</span>
                    <select className="sel" style={{ width: "auto", minWidth: 150 }} value={base} onChange={(e) => setBase(e.target.value)}>{CUR_LIST.map((c) => <option key={c} value={c}>{c} · {CUR_LABEL[c]}</option>)}</select>
                    <button className="btn-ghost" style={{ padding: "7px 12px", fontSize: 12.5, marginLeft: "auto" }} onClick={() => refreshRates(false)} disabled={fxStatus === "loading"}>

                  <div style={{ display: "grid", gap: 10, gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))" }}>
                    {CUR_LIST.filter((c) => c !== "HKD").map((c) => (
                      <div key={c} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontFamily: T.sans, fontSize: 12.5, fontWeight: 600, color: T.inkSoft, width: 58 }}>1 {c} =</span>
                        <MoneyInput className="inp" value={rates[c]} onCommit={(n) => setRate(c, n)} style={{ padding: "7px 9px" }} />

                    ))}
                  </div>
                </div>

            </div>

            <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", marginBottom: 18 }}>
              <Stat label="每月平均支出" value={bMoney(M.expense)} accent={T.forest} sub={`物業 ${fmt(M.catEx.物業)} · 保險 ${fmt(M.catEx.保險)} · 負債 ${fmt(M.catEx.負債)}`} />

              <Stat label="剩餘總負債" value={bMoney(M.debtTotal)} accent={T.neg} sub={`${data.properties.length} 物業 + ${data.debts.length} 負債`} />
              <Stat label="總資產" value={bMoney(totalAssets)} accent={T.forest} sub={`${(data.accounts || []).length} 個帳戶 · 含股票`} />
              <Stat label="淨資產" value={`${totalAssets - M.debtTotal < 0 ? "−" : ""}${bMoney(Math.abs(totalAssets - M.debtTotal))}`} accent={totalAssets - M.debtTotal >= 0 ? T.pos : T.neg} sub="資產 − 總負債" />
            </div>

            <div style={{ display: "grid", gap: 16, gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))" }}>
              <div className="card" style={{ padding: 20 }}>
                <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, marginBottom: 14 }}>每月支出分類</div>
                <Donut slices={catSlices} total={M.expense} label="每月支出" baseLabel={base} />
                <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
                  {catSlices.map((s, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 9 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 3, background: s.color, flexShrink: 0 }} />
                      <span style={{ fontFamily: T.sans, fontSize: 13, color: T.inkSoft, flex: 1 }}>{s.name}</span>
                      <span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 700, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{fmt(s.value)}</span>
                      <span style={{ fontFamily: T.sans, fontSize: 12, color: T.muted, width: 38, textAlign: "right" }}>{Math.round((s.value / M.expense) * 100)}%</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card" style={{ padding: 20 }}>
                <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, marginBottom: 18 }}>收支比較 <span style={{ fontSize: 12, color: T.muted, fontFamily: T.sans }}>({base})</span></div>
                {(() => {
                  const max = Math.max(M.income, M.expense, 1);
                  const Bar = ({ label, val, color }) => (
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.inkSoft }}>{label}</span><span style={{ fontFamily: T.sans, fontSize: 14, fontWeight: 700, color, fontVariantNumeric: "tabular-nums" }}>{fmt(val)}</span></div>
                      <div style={{ height: 12, background: T.surfaceAlt, borderRadius: 999, overflow: "hidden" }}><div style={{ height: "100%", width: `${(val / max) * 100}%`, background: color, borderRadius: 999, transition: "width .5s ease" }} /></div>
                    </div>
                  );
                  return (<>
                    <Bar label="每月收入" val={M.income} color={T.pos} />
                    <Bar label="每月支出" val={M.expense} color={T.forest} />
                    <div style={{ marginTop: 20, paddingTop: 16, borderTop: `1px solid ${T.line}`, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span style={{ fontFamily: T.sans, fontSize: 13.5, fontWeight: 600, color: T.inkSoft }}>每月結餘</span>
                      <span style={{ fontFamily: T.serif, fontSize: 23, fontWeight: 600, color: M.balance >= 0 ? T.pos : T.neg, fontVariantNumeric: "tabular-nums" }}>{(M.balance >= 0 ? "+" : "−") + fmt(Math.abs(M.balance))}</span>
                    </div>
                  </>);
                })()}
              </div>

              <div className="card" style={{ padding: 20, gridColumn: "1 / -1" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 6 }}>
                  <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600 }}>各幣別收支(每月)</div>
                  <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted }}>看清楚你的錢在哪一種貨幣裡進出</div>
                </div>
                {(() => {
                  const curs = Array.from(new Set([...Object.keys(M.byCur), ...Object.keys(M.byCurInc)])).filter((c) => (M.byCur[c] || 0) > 0 || (M.byCurInc[c] || 0) > 0);
                  curs.sort((a, b) => (tb(M.byCurInc[b] || 0, b) + tb(M.byCur[b] || 0, b)) - (tb(M.byCurInc[a] || 0, a) + tb(M.byCur[a] || 0, a)));
                  if (!curs.length) return <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, marginTop: 10 }}>尚無資料。</div>;
                  return (
                    <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit,minmax(215px,1fr))", marginTop: 14 }}>
                      {curs.map((c) => {
                        const inc = M.byCurInc[c] || 0, exp = M.byCur[c] || 0, net = inc - exp;
                        return (
                          <div key={c} style={{ border: `1px solid ${T.line}`, borderRadius: 14, padding: "14px 16px", background: T.surfaceAlt }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Badge color={T.forest} bg={T.forestSoft}>{c}</Badge><span style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted }}>{CUR_LABEL[c]}</span></div>
                              <span style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 600, color: net >= 0 ? T.pos : T.neg, fontVariantNumeric: "tabular-nums" }}>{(net >= 0 ? "+" : "−") + fmt(Math.abs(net))}</span>
                            </div>
                            <div style={{ display: "flex", gap: 18, marginTop: 12 }}>
                              <Mini label="收入" value={cur(inc, c)} accent={T.pos} />
                              <Mini label="支出" value={cur(exp, c)} accent={T.forest} />
                            </div>
                            <div style={{ marginTop: 10, fontFamily: T.sans, fontSize: 11, color: T.muted, fontVariantNumeric: "tabular-nums" }}>結餘 ≈ {bMoney(tb(net, c))}{c !== base ? ` · 1 ${c} = ${rates[c]} HKD` : ""}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>

              <div className="card" style={{ padding: 20, gridColumn: "1 / -1" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}><MapPin size={17} color={T.brass} /><div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600 }}>各地點收支(每月)</div></div>
                  <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted }}>每個地方收進來 − 付出去</div>
                </div>
                {(() => {
                  const accts = Object.keys(M.acct).sort((a, b) => (M.acct[b].inBase - M.acct[b].outBase) - (M.acct[a].inBase - M.acct[a].outBase));
                  if (!accts.length) return <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, marginTop: 10 }}>在收入與支出填上「存放地點 / 帳戶」(例如:中國微信、香港銀行),這裡就會依地點顯示收入、支出與淨流。</div>;
                  return (
                    <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit,minmax(230px,1fr))", marginTop: 14 }}>
                      {accts.map((a) => {
                        const info = M.acct[a], net = info.inBase - info.outBase;
                        return (
                          <div key={a} style={{ border: `1px solid ${T.line}`, borderRadius: 14, padding: "14px 16px", background: T.surfaceAlt }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                              <span style={{ fontFamily: T.sans, fontSize: 13.5, fontWeight: 700, color: T.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a}</span>
                              <span style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 600, color: net >= 0 ? T.pos : T.neg, fontVariantNumeric: "tabular-nums" }}>{(net >= 0 ? "+" : "−") + fmt(Math.abs(net))}</span>
                            </div>
                            <div style={{ display: "flex", gap: 18, marginTop: 12 }}>
                              <Mini label="收入" value={bMoney(info.inBase)} accent={T.pos} />
                              <Mini label="支出" value={bMoney(info.outBase)} accent={T.forest} />
                            </div>
                            <div style={{ marginTop: 10, fontFamily: T.sans, fontSize: 11, color: T.muted }}>淨流 ≈ {bMoney(net)} / 月</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>

              <div className="card" style={{ padding: 20 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Receipt size={17} color={T.brass} /><div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600 }}>臨時支出 · {now.getFullYear()}年</div></div>
                  <button className="btn-ghost" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setTab("oneoff")}>查看</button>
                </div>
                {(() => {
                  const yr = now.getFullYear();
                  const items = (data.oneoffs || []).filter((o) => o.date && new Date(o.date).getFullYear() === yr);
                  if (!items.length) return <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted }}>今年還沒有臨時支出。在「臨時」分頁新增。</div>;
                  const total = items.reduce((s, o) => s + tb(o.amount, o.currency), 0);
                  const byCat = {}; items.forEach((o) => { const k = o.category || "未分類"; byCat[k] = (byCat[k] || 0) + tb(o.amount, o.currency); });
                  const cats = Object.keys(byCat).sort((a, b) => byCat[b] - byCat[a]);
                  return (
                    <div>
                      <div style={{ fontFamily: T.serif, fontSize: 24, fontWeight: 600, color: T.neg, fontVariantNumeric: "tabular-nums" }}>{bMoney(total)}</div>
                      <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 9 }}>
                        {cats.map((c) => { const pct = total > 0 ? byCat[c] / total * 100 : 0; return (
                          <div key={c}>
                            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: T.sans, fontSize: 12.5 }}><span style={{ color: T.inkSoft }}>{c}</span><span style={{ fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{bMoney(byCat[c])}</span></div>
                            <div style={{ height: 6, borderRadius: 3, background: T.surfaceAlt, marginTop: 4, overflow: "hidden" }}><div style={{ width: `${pct}%`, height: "100%", background: "#7C6F64" }} /></div>
                          </div>
                        ); })}
                      </div>
                    </div>
                  );
                })()}
              </div>

              <div className="card" style={{ padding: 20 }}>

                        <Badge color={r.m <= 12 ? T.brass : T.inkSoft} bg={r.m <= 12 ? T.brassSoft : T.surfaceAlt}>{countdownText(r.date)}</Badge>
                      </div>

                  </div>
                )}
              </div>
            </div>
          </div>

      )}

      {/* ============ MONTHLY CHECKLIST ============ */}
      {tab === "monthly" && (() => {
        const dueRecur = lines.ex.filter((l) => isDue(l.freq, l.anchor, curM));
        const dueInc = lines.inc.filter((l) => isDue(l.freq, l.anchor, curM) && activeRange(l.start, l.end, curY, curM));
        const monthOneoffs = (data.oneoffs || []).filter((o) => { const p = (o.date || "").split("-").map(Number); return p[0] === curY && p[1] === curM; }).map((o) => ({ key: `oneoff:${o.id}`, cat: "臨時", name: o.name, currency: o.currency, amount: numify(o.amount), date: o.date, oneoff: true }));
        const dueEx = [...dueRecur, ...monthOneoffs];
        const expDue = dueEx.reduce((s, l) => s + tb(l.amount, l.currency), 0);
        const expPaid = dueEx.reduce((s, l) => s + (monthRec[l.key] ? paidBase(monthRec[l.key], l.currency) : 0), 0);
        const incDue = dueInc.reduce((s, l) => s + tb(l.amount, l.currency), 0);
        const incGot = dueInc.reduce((s, l) => s + (monthRec[l.key] ? paidBase(monthRec[l.key], l.currency) : 0), 0);
        const paidCount = dueEx.filter((l) => monthRec[l.key]).length;
        const renderRow = (line, verb) => {
          const paid = !!monthRec[line.key];
          return (
            <div key={line.key} style={{ display: "flex", alignItems: "flex-start", gap: 11, padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>

              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: T.sans, fontSize: 13.5, fontWeight: 600, color: paid ? T.inkSoft : T.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{line.name}</div>
                {paid ? <input type="date" value={monthRec[line.key].date || ""} onChange={(e) => editPaid(line, "date", e.target.value)} style={{ marginTop: 4, fontFamily: T.sans, fontSize: 11.5, color: T.muted, background: "transparent", border: "none", padding: 0, cursor: "pointer" }} /> : (line.oneoff && line.date && <div style={{ marginTop: 3, fontFamily: T.sans, fontSize: 11.5, color: T.muted }}>{fmtDate(line.date)} 預定</div>)}
              </div>
              {line.oneoff ? <Badge color="#6F655A" bg="#ECE6DC">臨時</Badge> : (line.freq !== "monthly" && <Badge color={T.brass} bg={T.brassSoft}>{FREQ[line.freq].short}繳</Badge>)}
              {paid ? (
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted, fontWeight: 600 }}>{line.currency}</span>
                  <MoneyInput value={monthRec[line.key].amount} onCommit={(n) => editPaid(line, "amount", n)} style={{ width: 92, fontFamily: T.sans, fontSize: 16, fontWeight: 700, color: T.pos, background: T.surface, border: `1px solid ${T.line}`, borderRadius: 9, padding: "6px 8px", textAlign: "right", fontVariantNumeric: "tabular-nums" }} />
                </div>
              ) : (
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: T.sans, fontSize: 14, fontWeight: 700, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{cur(line.amount, line.currency)}</div>
                  <div style={{ fontFamily: T.sans, fontSize: 10.5, color: T.muted }}>未{verb === "確認已收" ? "收" : "付"}</div>
                </div>
              )}
            </div>
          );
        };
        return (
          <div>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                <NavBar label={`${curY}年${curM}月`} onPrev={() => stepMonth(-1)} onNext={() => stepMonth(1)} onToday={() => { setCurY(now.getFullYear()); setCurM(now.getMonth() + 1); }} />
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: T.sans, fontSize: 12, color: T.muted }}>本月支出 已付 {paidCount} / {dueEx.length} 項</div>
                  <div style={{ fontFamily: T.serif, fontSize: 22, fontWeight: 600, color: T.forest, fontVariantNumeric: "tabular-nums" }}>{bMoney(expPaid)} <span style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, fontWeight: 500 }}>/ {bMoney(expDue)}</span></div>
                </div>
              </div>
              <div style={{ height: 10, background: T.surfaceAlt, borderRadius: 999, overflow: "hidden", marginTop: 14 }}><div style={{ height: "100%", width: `${expDue > 0 ? Math.min(100, (expPaid / expDue) * 100) : 0}%`, background: `linear-gradient(90deg,${T.forest},${T.brass})`, borderRadius: 999, transition: "width .5s ease" }} /></div>
              <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted, marginTop: 10 }}>繳費後點左邊圓圈打勾,金額可直接改成實際付的數字。年繳項目(火險、保險)只在該繳的月份出現。</div>
            </div>

            {EXP_CATS.map((catKey) => {
              const items = dueEx.filter((l) => l.cat === catKey);
              if (!items.length) return null;
              return (
                <div key={catKey} className="card" style={{ padding: "16px 20px", marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: CAT_COLOR[catKey] }} /><div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 600 }}>{catKey}</div></div>
                  {items.map((l) => renderRow(l, "確認已付"))}
                </div>
              );
            })}

            {monthOneoffs.length > 0 && (
              <div className="card" style={{ padding: "16px 20px", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: CAT_COLOR["臨時"] }} /><div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 600 }}>臨時 / 一次性</div></div>
                {monthOneoffs.map((l) => renderRow(l, "確認已付"))}
              </div>
            )}

            {dueInc.length > 0 && (
              <div className="card" style={{ padding: "16px 20px", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: T.pos }} /><div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 600 }}>收入</div></div>
                  <div style={{ fontFamily: T.sans, fontSize: 12.5, color: T.muted, fontVariantNumeric: "tabular-nums" }}>已收 {bMoney(incGot)} / {bMoney(incDue)}</div>
                </div>
                {dueInc.map((l) => renderRow(l, "確認已收"))}
              </div>
            )}
          </div>
        );
      })()}

      {/* ============ ANNUAL FORECAST ============ */}
      {tab === "annual" && (() => {
        const lineMap = {}; [...lines.ex, ...lines.inc].forEach((l) => { lineMap[l.key] = l; });
        (data.oneoffs || []).forEach((o) => { lineMap[`oneoff:${o.id}`] = { key: `oneoff:${o.id}`, cat: "臨時", name: o.name, currency: o.currency }; });
        const actual = { 物業: 0, 保險: 0, 負債: 0, 固定費: 0, 生活費: 0, 臨時: 0, 收入: 0 };
        const monthlySpend = Array(12).fill(0);
        for (let mm = 1; mm <= 12; mm++) {
          const rec = data.payments[ymOf(fcYear, mm)] || {};
          Object.entries(rec).forEach(([k, v]) => { const l = lineMap[k]; if (!l) return; const b = paidBase(v, l.currency); actual[l.cat] += b; if (l.cat !== "收入") monthlySpend[mm - 1] += b; });
        }
        const fcDefault = { 物業: 0, 保險: 0, 負債: 0, 固定費: 0, 生活費: 0, 臨時: 0, 收入: 0 };
        lines.ex.forEach((l) => { fcDefault[l.cat] += tb(perMonth(l.amount, l.freq), l.currency) * 12; });
        lines.inc.forEach((l) => { let am = 0; for (let mm = 1; mm <= 12; mm++) if (activeRange(l.start, l.end, fcYear, mm)) am++; fcDefault["收入"] += tb(perMonth(l.amount, l.freq), l.currency) * am; });
        const fcStore = data.forecasts[fcYear] || {};
        const fcVal = (c) => (fcStore[c] != null ? fcStore[c] : Math.round(fcDefault[c]));
        const ANN_CATS = [...EXP_CATS, "臨時"];
        const expFc = ANN_CATS.reduce((s, c) => s + fcVal(c), 0);
        const expAct = ANN_CATS.reduce((s, c) => s + actual[c], 0);
        const applyDefaults = () => persist({ ...data, forecasts: { ...data.forecasts, [fcYear]: { 物業: Math.round(fcDefault.物業), 保險: Math.round(fcDefault.保險), 負債: Math.round(fcDefault.負債), 固定費: Math.round(fcDefault.固定費), 生活費: Math.round(fcDefault.生活費), 臨時: fcStore.臨時 != null ? fcStore.臨時 : 0, 收入: Math.round(fcDefault.收入) } } });
        const isCurYear = fcYear === now.getFullYear();
        const maxSpend = Math.max(...monthlySpend, 1);
        const RowFc = ({ c }) => {
          const f = fcVal(c), a = actual[c], diff = a - f;
          return (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr 1fr", gap: 8, alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${T.line}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}><span style={{ width: 9, height: 9, borderRadius: 3, background: CAT_COLOR[c] }} /><span style={{ fontFamily: T.sans, fontSize: 13.5, fontWeight: 600 }}>{c}</span></div>
              <MoneyInput value={fcVal(c)} onCommit={(n) => setForecast(c, n)} style={{ width: "100%", fontFamily: T.sans, fontSize: 13.5, fontWeight: 600, color: T.inkSoft, background: T.surface, border: `1px solid ${T.line}`, borderRadius: 9, padding: "6px 8px", textAlign: "right", fontVariantNumeric: "tabular-nums" }} />
              <div style={{ textAlign: "right", fontFamily: T.sans, fontSize: 13.5, fontWeight: 700, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{fmt(a)}</div>
              <div style={{ textAlign: "right", fontFamily: T.sans, fontSize: 13, fontWeight: 700, color: a === 0 ? T.muted : diff > 0 ? T.neg : T.pos, fontVariantNumeric: "tabular-nums" }}>{a === 0 ? "—" : (diff > 0 ? "+" : "") + fmt(diff)}</div>
            </div>
          );
        };
        return (
          <div>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                <NavBar label={`${fcYear}年`} onPrev={() => setFcYear(fcYear - 1)} onNext={() => setFcYear(fcYear + 1)} onToday={isCurYear ? null : () => setFcYear(now.getFullYear())} />
                <button className="btn-ghost" style={{ fontSize: 12.5 }} onClick={applyDefaults}><RotateCcw size={14} />套用目前推算</button>
              </div>
              <div style={{ fontFamily: T.sans, fontSize: 12, color: T.muted, marginTop: 10 }}>填入這一年的「預測」預算(可先按「套用目前推算」帶入,再手動調整)。「實際」會隨你每月在「每月對帳」確認已付而自動累積,年尾即可對比。金額皆以 {base} 計。</div>
            </div>

            <div className="card" style={{ padding: 20, marginBottom: 16, overflowX: "auto" }}>
              <div style={{ minWidth: 380 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr 1fr", gap: 8, paddingBottom: 8, borderBottom: `1.5px solid ${T.line}` }}>
                  <span style={{ fontFamily: T.sans, fontSize: 11.5, fontWeight: 700, color: T.muted }}>支出類別</span>
                  <span style={{ fontFamily: T.sans, fontSize: 11.5, fontWeight: 700, color: T.muted, textAlign: "right" }}>預測</span>
                  <span style={{ fontFamily: T.sans, fontSize: 11.5, fontWeight: 700, color: T.muted, textAlign: "right" }}>實際</span>
                  <span style={{ fontFamily: T.sans, fontSize: 11.5, fontWeight: 700, color: T.muted, textAlign: "right" }}>差異</span>
                </div>
                {EXP_CATS.map((c) => <RowFc key={c} c={c} />)}
                <RowFc c="臨時" />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr 1fr", gap: 8, alignItems: "center", paddingTop: 11 }}>
                  <span style={{ fontFamily: T.serif, fontSize: 15, fontWeight: 600 }}>支出合計</span>
                  <span style={{ textAlign: "right", fontFamily: T.sans, fontSize: 14, fontWeight: 700, color: T.inkSoft, fontVariantNumeric: "tabular-nums" }}>{fmt(expFc)}</span>
                  <span style={{ textAlign: "right", fontFamily: T.sans, fontSize: 14, fontWeight: 700, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{fmt(expAct)}</span>
                  <span style={{ textAlign: "right", fontFamily: T.sans, fontSize: 14, fontWeight: 700, color: expAct === 0 ? T.muted : expAct - expFc > 0 ? T.neg : T.pos, fontVariantNumeric: "tabular-nums" }}>{expAct === 0 ? "—" : (expAct - expFc > 0 ? "+" : "") + fmt(expAct - expFc)}</span>
                </div>
              </div>
            </div>

            <div style={{ display: "grid", gap: 16, gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))" }}>
              <div className="card" style={{ padding: 20 }}>
                <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, marginBottom: 16 }}>預測 vs 實際 · 支出</div>
                {(() => {
                  const max = Math.max(expFc, expAct, 1);
                  const Bar = ({ label, val, color }) => (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.inkSoft }}>{label}</span><span style={{ fontFamily: T.sans, fontSize: 14, fontWeight: 700, color, fontVariantNumeric: "tabular-nums" }}>{bMoney(val)}</span></div>
                      <div style={{ height: 12, background: T.surfaceAlt, borderRadius: 999, overflow: "hidden" }}><div style={{ height: "100%", width: `${(val / max) * 100}%`, background: color, borderRadius: 999, transition: "width .5s ease" }} /></div>
                    </div>
                  );
                  return (<>
                    <Bar label="預測支出" val={expFc} color={T.brass} />
                    <Bar label="實際支出" val={expAct} color={T.forest} />
                    <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px solid ${T.line}`, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.inkSoft }}>{expAct > expFc ? "超出預算" : "結餘 / 尚未用完"}</span>
                      <span style={{ fontFamily: T.serif, fontSize: 20, fontWeight: 600, color: expAct > expFc ? T.neg : T.pos, fontVariantNumeric: "tabular-nums" }}>{(expAct - expFc > 0 ? "+" : "−") + fmt(Math.abs(expAct - expFc))}</span>
                    </div>
                  </>);
                })()}
              </div>

              <div className="card" style={{ padding: 20 }}>
                <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, marginBottom: 6 }}>收入 · 預測 vs 實際</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr 1fr", gap: 8, alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>
                  <span style={{ fontFamily: T.sans, fontSize: 13.5, fontWeight: 600, color: T.pos }}>收入</span>
                  <MoneyInput value={fcVal("收入")} onCommit={(n) => setForecast("收入", n)} style={{ width: "100%", fontFamily: T.sans, fontSize: 13.5, fontWeight: 600, color: T.inkSoft, background: T.surface, border: `1px solid ${T.line}`, borderRadius: 9, padding: "6px 8px", textAlign: "right", fontVariantNumeric: "tabular-nums" }} />
                  <div style={{ textAlign: "right", fontFamily: T.sans, fontSize: 13.5, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{fmt(actual.收入)}</div>
                  <div style={{ textAlign: "right", fontFamily: T.sans, fontSize: 13, fontWeight: 700, color: actual.收入 === 0 ? T.muted : T.pos, fontVariantNumeric: "tabular-nums" }}>{actual.收入 === 0 ? "—" : (actual.收入 - fcVal("收入") > 0 ? "+" : "") + fmt(actual.收入 - fcVal("收入"))}</div>
                </div>
                <div style={{ marginTop: 14, padding: "12px 14px", background: T.surfaceAlt, borderRadius: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.inkSoft }}>預計全年結餘</span>
                    <span style={{ fontFamily: T.serif, fontSize: 20, fontWeight: 600, color: fcVal("收入") - expFc >= 0 ? T.pos : T.neg, fontVariantNumeric: "tabular-nums" }}>{(fcVal("收入") - expFc >= 0 ? "+" : "−") + fmt(Math.abs(fcVal("收入") - expFc))}</span>
                  </div>
                  <div style={{ fontFamily: T.sans, fontSize: 11, color: T.muted, marginTop: 4 }}>= 預測收入 − 預測支出</div>
                </div>
              </div>

              <div className="card" style={{ padding: 20, gridColumn: "1 / -1" }}>
                <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, marginBottom: 16 }}>{fcYear} 年各月實際支出</div>
                <div style={{ display: "flex", alignItems: "flex-end", gap: "min(2vw,10px)", height: 130 }}>
                  {monthlySpend.map((v, i) => (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                      <div style={{ fontFamily: T.sans, fontSize: 9, color: T.muted, fontVariantNumeric: "tabular-nums" }}>{v > 0 ? fmt(v / 1000) + "k" : ""}</div>
                      <div style={{ width: "100%", maxWidth: 26, height: `${(v / maxSpend) * 88}px`, minHeight: v > 0 ? 3 : 0, background: i + 1 === curM && fcYear === curY ? T.brass : T.forest, borderRadius: "5px 5px 0 0", transition: "height .4s ease" }} />
                      <div style={{ fontFamily: T.sans, fontSize: 10, color: T.muted }}>{i + 1}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ============ PROPERTIES ============ */}
      {tab === "properties" && (
        <div>
          <SectionHeader title="物業" count={data.properties.length} onAdd={() => openAdd("property")} addLabel="新增物業" />
          {data.properties.length === 0 ? <EmptyState icon={Building2} title="還沒有物業" desc="每個物業可放房貸、保險貸款、火險、管理費、水電網等費用,系統會自動換算各幣別並算出每月合計。" cta="新增物業" onCta={() => openAdd("property")} /> : (
            <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))" }}>
              {data.properties.map((p) => {
                const ln = p.loan || {};
                const monthlyBase = tb(ln.monthly, ln.currency || "HKD") + (p.costs || []).reduce((a, c) => a + tb(perMonth(c.amount, c.freq || "monthly"), c.currency), 0);
                const mInt = numify(ln.principal) * numify(ln.rate) / 100 / 12;
                const mPrin = Math.max(0, numify(ln.monthly) - mInt);
                let prog = null, paidM = null, totalM = null;
                if (ln.start && ln.end) { const s = new Date(ln.start), e = new Date(ln.end); totalM = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth()); paidM = (now.getFullYear() - s.getFullYear()) * 12 + (now.getMonth() - s.getMonth()); if (totalM > 0) prog = Math.min(100, Math.max(0, (paidM / totalM) * 100)); }
                return (
                  <div key={p.id} className="card rise" style={{ padding: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div><div style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 600 }}>{p.name}</div>{p.region && <div style={{ marginTop: 5 }}><Badge>{p.region}</Badge></div>}</div>
                      <div style={{ display: "flex", gap: 2 }}><IconBtn title="編輯" onClick={() => openEdit("property", p)}><Pencil size={15} /></IconBtn><IconBtn title="刪除" danger onClick={() => remove("property", p.id)}><Trash2 size={15} /></IconBtn></div>
                    </div>
                    {numify(ln.monthly) > 0 && (<>
                      <div style={{ marginTop: 12, fontFamily: T.sans, fontSize: 11.5, color: T.muted, fontWeight: 600 }}>房貸 · 每月還款</div>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 2 }}><span style={{ fontFamily: T.serif, fontSize: 26, fontWeight: 600, color: T.forest, fontVariantNumeric: "tabular-nums" }}>{cur(ln.monthly, ln.currency)}</span></div>
                      <CardRow><Mini label="剩餘本金" value={cur(ln.principal, ln.currency)} accent={T.neg} /><Mini label="年利率" value={numify(ln.rate).toFixed(2) + "%"} /><Mini label="還清日期" value={ln.end ? fmtDate(ln.end) : "—"} /></CardRow>
                      {numify(ln.rate) > 0 && <div style={{ marginTop: 12, padding: "9px 12px", background: T.surfaceAlt, borderRadius: 11, fontFamily: T.sans, fontSize: 12.5, color: T.inkSoft }}>每月還款中 · 利息約 <b style={{ color: T.neg }}>{cur(mInt, ln.currency)}</b>,本金約 <b style={{ color: T.forest }}>{cur(mPrin, ln.currency)}</b></div>}
                      {prog != null && <div style={{ marginTop: 12 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontFamily: T.sans, fontSize: 12, color: T.muted }}><span>已繳 {Math.max(0, paidM)} / 共 {totalM} 期</span><span>{countdownText(ln.end)}</span></div><div style={{ height: 8, background: T.surfaceAlt, borderRadius: 999, overflow: "hidden" }}><div style={{ height: "100%", width: `${prog}%`, background: `linear-gradient(90deg,${T.forest},${T.brass})`, borderRadius: 999 }} /></div></div>}
                    </>)}
                    {(p.costs || []).length > 0 && (
                      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.line}` }}>
                        <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted, fontWeight: 600, marginBottom: 8 }}>其他費用</div>
                        {p.costs.map((c) => (
                          <div key={c.id} style={{ padding: "4px 0" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: T.sans, fontSize: 13 }}>
                              <span style={{ color: T.inkSoft }}>{c.label}{c.freq && c.freq !== "monthly" ? ` · ${FREQ[c.freq].short}繳${c.dueMonth ? ` ${c.dueMonth}月` : ""}` : ""}{c.isLoan ? " · 貸款" : ""}</span>
                              <span style={{ fontWeight: 600, color: T.ink, fontVariantNumeric: "tabular-nums" }}>{cur(c.amount, c.currency)}</span>
                            </div>
                            {c.isLoan && numify(c.principal) > 0 && <div style={{ fontFamily: T.sans, fontSize: 11, color: T.muted, marginTop: 2 }}>剩 {cur(c.principal, c.currency)} · 年利率 {numify(c.rate).toFixed(2)}%</div>}
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${T.line}`, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}><span style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.inkSoft }}>每月平均合計</span><span style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 600, color: T.ink, fontVariantNumeric: "tabular-nums" }}>≈ {bMoney(monthlyBase)}</span></div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ============ INSURANCE ============ */}
      {tab === "insurance" && (
        <div>
          <SectionHeader title="保險" count={data.insurances.length} onAdd={() => openAdd("insurance")} addLabel="新增保險" />
          {data.insurances.length === 0 ? <EmptyState icon={Shield} title="還沒有保險" desc="記下每張保單的險種、保費與繳費頻率,自動換算每月平均並計入支出。" cta="新增保險" onCta={() => openAdd("insurance")} /> : (
            <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))" }}>
              {data.insurances.map((i) => (
                <div key={i.id} className="card rise" style={{ padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div><div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 600, lineHeight: 1.25 }}>{i.name}</div><div style={{ marginTop: 6, display: "flex", gap: 6 }}><Badge color={T.brass} bg={T.brassSoft}>{i.type}</Badge><Badge>{i.currency}</Badge></div></div>
                    <div style={{ display: "flex", gap: 2 }}><IconBtn title="編輯" onClick={() => openEdit("insurance", i)}><Pencil size={15} /></IconBtn><IconBtn title="刪除" danger onClick={() => remove("insurance", i.id)}><Trash2 size={15} /></IconBtn></div>
                  </div>
                  <div style={{ marginTop: 12, display: "flex", alignItems: "baseline", gap: 6 }}><span style={{ fontFamily: T.serif, fontSize: 24, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{cur(i.premium, i.currency)}</span><span style={{ fontFamily: T.sans, fontSize: 13, color: T.muted }}>/ {FREQ[i.frequency]?.label}</span></div>
                  <CardRow><Mini label="每月平均" value={cur(perMonth(i.premium, i.frequency), i.currency)} accent={T.forest} /><Mini label="≈ 折合" value={bMoney(tb(perMonth(i.premium, i.frequency), i.currency))} /><Mini label="繳費期滿" value={i.end ? fmtDate(i.end) : "—"} /></CardRow>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ============ DEBTS ============ */}
      {tab === "debts" && (
        <div>
          <SectionHeader title="負債" count={data.debts.length} onAdd={() => openAdd("debt")} addLabel="新增負債" />
          {data.debts.length === 0 ? <EmptyState icon={CreditCard} title="還沒有負債" desc="信用卡、私人貸款、學費貸款等,記下每月還款與剩餘金額。" cta="新增負債" onCta={() => openAdd("debt")} /> : (
            <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))" }}>
              {data.debts.map((d) => (
                <div key={d.id} className="card rise" style={{ padding: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div><div style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 600 }}>{d.name}</div><div style={{ marginTop: 6, display: "flex", gap: 6 }}><Badge color={T.neg} bg="#F6E2DB">{d.kind}</Badge><Badge>{d.currency}</Badge></div></div>
                    <div style={{ display: "flex", gap: 2 }}><IconBtn title="編輯" onClick={() => openEdit("debt", d)}><Pencil size={15} /></IconBtn><IconBtn title="刪除" danger onClick={() => remove("debt", d.id)}><Trash2 size={15} /></IconBtn></div>
                  </div>
                  <div style={{ marginTop: 12, display: "flex", alignItems: "baseline", gap: 6 }}><span style={{ fontFamily: T.serif, fontSize: 26, fontWeight: 600, color: T.neg, fontVariantNumeric: "tabular-nums" }}>{cur(d.monthly, d.currency)}</span><span style={{ fontFamily: T.sans, fontSize: 13, color: T.muted }}>/ 月</span></div>
                  <CardRow><Mini label="剩餘金額" value={cur(d.balance, d.currency)} /><Mini label="還清日期" value={d.end ? fmtDate(d.end) : "—"} /><Mini label="還款進度" value={countdownText(d.end) || "—"} accent={T.forest} /></CardRow>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ============ INCOME ============ */}
      {tab === "income" && (
        <div>
          <SectionHeader title="收入來源" count={data.incomes.length} onAdd={() => openAdd("income")} addLabel="新增來源" />
          {data.incomes.length === 0 ? <EmptyState icon={Coins} title="還沒有收入來源" desc="薪金、租金、家用等,系統用來對照支出、算出結餘。" cta="新增來源" onCta={() => openAdd("income")} /> : (() => {
            const order = []; const groups = {};

            <div className="fgrid2">
              <Field label="剩餘本金"><input className="inp" type="number" inputMode="decimal" placeholder="例如 3000000" value={form.loan?.principal} onChange={(e) => setLoanF("principal", e.target.value)} /></Field>
              <Field label="年利率 (%)"><input className="inp" type="number" step="0.001" inputMode="decimal" placeholder="例如 2.8" value={form.loan?.rate} onChange={(e) => setLoanF("rate", e.target.value)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="開始日期"><input className="inp" type="date" value={form.loan?.start} onChange={(e) => setLoanF("start", e.target.value)} /></Field>
              <Field label="還清日期"><input className="inp" type="date" value={form.loan?.end} onChange={(e) => setLoanF("end", e.target.value)} /></Field>
            </div>
            <Field label="房貸從哪個帳戶付" hint="用哪裡的錢付這筆房貸,例如:香港銀行"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.loan?.account || ""} onChange={(e) => setLoanF("account", e.target.value)} /></Field>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "8px 0 10px" }}>
              <span style={{ fontFamily: T.sans, fontSize: 12.5, fontWeight: 700, color: T.forest }}>其他費用</span>
              <button className="btn-ghost" style={{ padding: "5px 11px", fontSize: 12.5 }} onClick={addCostRow}><Plus size={14} />加一項</button>
            </div>
            {(form.costs || []).map((c, idx) => (
              <div key={c.id || idx} style={{ border: `1px solid ${T.line}`, borderRadius: 12, padding: 12, marginBottom: 10, background: T.surfaceAlt }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input className="inp" placeholder="名稱:火險 / 管理費 / 保險貸款…" value={c.label} onChange={(e) => setCost(idx, "label", e.target.value)} style={{ flex: 1 }} />
                  <button className="icon-btn" style={{ color: T.neg, flexShrink: 0 }} onClick={() => delCost(idx)}><X size={16} /></button>
                </div>
                <div className="fgrid2" style={{ marginTop: 8 }}>
                  <input className="inp" type="number" inputMode="decimal" placeholder="每次金額" value={c.amount} onChange={(e) => setCost(idx, "amount", e.target.value)} />
                  <select className="sel" value={c.currency} onChange={(e) => setCost(idx, "currency", e.target.value)}>{CUR_LIST.map((x) => <option key={x} value={x}>{x} · {CUR_LABEL[x]}</option>)}</select>
                </div>
                <div className="fgrid2" style={{ marginTop: 8 }}>
                  <select className="sel" value={c.freq || "monthly"} onChange={(e) => setCost(idx, "freq", e.target.value)}>{Object.entries(FREQ).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select>
                  {(c.freq && c.freq !== "monthly") ? (
                    <select className="sel" value={c.dueMonth || ""} onChange={(e) => setCost(idx, "dueMonth", e.target.value)}><option value="">幾月繳?</option>{Array.from({ length: 12 }, (_, i) => i + 1).map((m) => <option key={m} value={m}>{m} 月</option>)}</select>
                  ) : <div />}
                </div>
                <input className="inp" list="acctSuggest" placeholder="從哪個帳戶付(選填),例如:中國微信" value={c.account || ""} onChange={(e) => setCost(idx, "account", e.target.value)} style={{ marginTop: 8 }} />
                <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, cursor: "pointer", fontFamily: T.sans, fontSize: 13.5, color: T.inkSoft }}>
                  <input type="checkbox" checked={!!c.isLoan} onChange={(e) => setCost(idx, "isLoan", e.target.checked)} style={{ width: 18, height: 18 }} />
                  這項是貸款(有本金、利息)
                </label>
                {c.isLoan && (
                  <div style={{ marginTop: 8 }}>
                    <div className="fgrid2">
                      <input className="inp" type="number" inputMode="decimal" placeholder="剩餘本金" value={c.principal || ""} onChange={(e) => setCost(idx, "principal", e.target.value)} />
                      <input className="inp" type="number" step="0.001" inputMode="decimal" placeholder="年利率 %" value={c.rate || ""} onChange={(e) => setCost(idx, "rate", e.target.value)} />
                    </div>
                    <input className="inp" type="date" value={c.end || ""} onChange={(e) => setCost(idx, "end", e.target.value)} style={{ marginTop: 8 }} />
                    <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted, marginTop: 5 }}>上面的「每次金額」就是這筆貸款的每月還款;本金會算進總負債。</div>
                  </div>
                )}
              </div>
            ))}
            {(form.costs || []).length === 0 && <div style={{ fontFamily: T.sans, fontSize: 12, color: T.muted, marginBottom: 4 }}>可加入保險貸款、火險、管理費、水電網等。非月繳的可選「幾月繳」;若是貸款可勾選填本金與利率。</div>}
          </>)}

          {modal.type === "insurance" && (<>
            <Field label="保險名稱"><input className="inp" placeholder="例如:優裕醫療保" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="險種"><select className="sel" value={form.type} onChange={(e) => setF("type", e.target.value)}>{INS_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</select></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="保費金額" hint="每次繳的金額"><input className="inp" type="number" inputMode="decimal" placeholder="例如 6000" value={form.premium} onChange={(e) => setF("premium", e.target.value)} /></Field>
              <Field label="繳費頻率"><select className="sel" value={form.frequency} onChange={(e) => setF("frequency", e.target.value)}>{Object.entries(FREQ).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
            </div>
            <div className="fgrid2">
              <Field label="生效日期" hint="(決定年繳在哪個月扣)"><input className="inp" type="date" value={form.start} onChange={(e) => setF("start", e.target.value)} /></Field>
              <Field label="繳費期滿"><input className="inp" type="date" value={form.end} onChange={(e) => setF("end", e.target.value)} /></Field>
            </div>
            <Field label="從哪個帳戶付" hint="用哪裡的錢付,例如:香港銀行"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.account || ""} onChange={(e) => setF("account", e.target.value)} /></Field>
          </>)}

          {modal.type === "debt" && (<>
            <Field label="名稱"><input className="inp" placeholder="例如:HSBC 萬應錢" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="類型"><select className="sel" value={form.kind} onChange={(e) => setF("kind", e.target.value)}>{DEBT_KINDS.map((k) => <option key={k} value={k}>{k}</option>)}</select></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="每月還款"><input className="inp" type="number" inputMode="decimal" placeholder="例如 2000" value={form.monthly} onChange={(e) => setF("monthly", e.target.value)} /></Field>
              <Field label="剩餘金額"><input className="inp" type="number" inputMode="decimal" placeholder="例如 100000" value={form.balance} onChange={(e) => setF("balance", e.target.value)} /></Field>
            </div>
            <Field label="還清日期"><input className="inp" type="date" value={form.end} onChange={(e) => setF("end", e.target.value)} /></Field>
            <Field label="從哪個帳戶付" hint="用哪裡的錢還,例如:香港銀行"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.account || ""} onChange={(e) => setF("account", e.target.value)} /></Field>
          </>)}

          {modal.type === "income" && (<>
            <Field label="來源名稱"><input className="inp" placeholder="例如:聯榮 1、薪金、家用" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="金額"><input className="inp" type="number" inputMode="decimal" placeholder="例如 3000" value={form.amount} onChange={(e) => setF("amount", e.target.value)} /></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="週期"><select className="sel" value={form.cycle} onChange={(e) => setF("cycle", e.target.value)}>{Object.entries(CYCLE).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
              <Field label="群組" hint="同來源會歸在一起,如:聯榮大廈、前山、日本"><input className="inp" placeholder="聯榮大廈" value={form.group} onChange={(e) => setF("group", e.target.value)} /></Field>
            </div>
            <Field label="存放地點 / 帳戶" hint="錢實際收到、存放的地方(可跟合約幣別不同),例如:中國微信、香港銀行"><input className="inp" list="acctSuggest" placeholder="中國微信" value={form.account} onChange={(e) => setF("account", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="開始日期" hint="幾時開始有這筆收入(留空=一直都有)"><input className="inp" type="date" value={form.start} onChange={(e) => setF("start", e.target.value)} /></Field>
              <Field label="結束日期" hint="幾時結束(留空=持續中)"><input className="inp" type="date" value={form.end} onChange={(e) => setF("end", e.target.value)} /></Field>
            </div>
            <Field label="備註"><input className="inp" placeholder="(選填)" value={form.note} onChange={(e) => setF("note", e.target.value)} /></Field>
          </>)}

          {modal.type === "subscription" && (<>
            <Field label="名稱"><input className="inp" placeholder="例如:ChatGPT" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="金額"><input className="inp" type="number" inputMode="decimal" placeholder="22" value={form.amount} onChange={(e) => setF("amount", e.target.value)} /></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <Field label="週期"><select className="sel" value={form.cycle} onChange={(e) => setF("cycle", e.target.value)}>{Object.entries(CYCLE).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
            <Field label="從哪個帳戶付" hint="用哪裡的錢付,例如:香港銀行"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.account || ""} onChange={(e) => setF("account", e.target.value)} /></Field>
          </>)}

          {modal.type === "living" && (<>
            <Field label="名稱"><input className="inp" placeholder="例如:零用錢、手機費、家用" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="金額" hint="平時的金額,每月可在「每月對帳」改實際數"><input className="inp" type="number" inputMode="decimal" placeholder="例如 5000" value={form.amount} onChange={(e) => setF("amount", e.target.value)} /></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="週期"><select className="sel" value={form.cycle} onChange={(e) => setF("cycle", e.target.value)}>{Object.entries(CYCLE).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></Field>
              <Field label="備註"><input className="inp" placeholder="(選填)" value={form.note} onChange={(e) => setF("note", e.target.value)} /></Field>
            </div>
            <Field label="從哪個帳戶付" hint="用哪裡的錢付,例如:中國微信"><input className="inp" list="acctSuggest" placeholder="中國微信" value={form.account || ""} onChange={(e) => setF("account", e.target.value)} /></Field>
          </>)}

          {modal.type === "oneoff" && (<>
            <Field label="項目名稱"><input className="inp" placeholder="例如:機票、家電、律師費" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="金額"><input className="inp" type="number" inputMode="decimal" placeholder="例如 3000" value={form.amount} onChange={(e) => setF("amount", e.target.value)} /></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="分類" hint="旅遊 / 買東西 / 禮物 / 請食飯…(可自己打)"><input className="inp" list="catSuggest" placeholder="旅遊" value={form.category || ""} onChange={(e) => setF("category", e.target.value)} /></Field>
              <Field label="日期" hint="決定它算在哪個月 / 哪一年"><input className="inp" type="date" value={form.date} onChange={(e) => setF("date", e.target.value)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="從哪個帳戶付" hint="用哪裡的錢付,例如:香港銀行"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.account || ""} onChange={(e) => setF("account", e.target.value)} /></Field>
              <Field label="備註"><input className="inp" placeholder="(選填)" value={form.note} onChange={(e) => setF("note", e.target.value)} /></Field>
            </div>
          </>)}

          {modal.type === "account" && (<>
            <Field label="帳戶名稱" hint="例如:香港銀行、中國微信、股票戶口"><input className="inp" list="acctSuggest" placeholder="香港銀行" value={form.name} onChange={(e) => setF("name", e.target.value)} /></Field>
            <div className="fgrid2">
              <Field label="類型"><select className="sel" value={form.type} onChange={(e) => setF("type", e.target.value)}>{Object.entries(ACCT_TYPES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <Field label="目前餘額" hint="這個帳戶現在實際有多少(股票就填現值)。算進總資產。之後把它改成最新的實際金額,就會顯示和『本來』差多少、有沒有少錢。"><input className="inp" type="number" inputMode="decimal" placeholder="例如 50000" value={form.balance} onChange={(e) => setF("balance", e.target.value)} /></Field>
            <Field label="備註"><input className="inp" placeholder="(選填)" value={form.note} onChange={(e) => setF("note", e.target.value)} /></Field>
          </>)}

          {modal.type === "transfer" && (<>
            <div className="fgrid2">
              <Field label="從哪個帳戶"><select className="sel" value={form.from} onChange={(e) => setF("from", e.target.value)}><option value="">選擇…</option>{acctNames.map((n) => <option key={n} value={n}>{n}</option>)}</select></Field>
              <Field label="到哪個帳戶"><select className="sel" value={form.to} onChange={(e) => setF("to", e.target.value)}><option value="">選擇…</option>{acctNames.map((n) => <option key={n} value={n}>{n}</option>)}</select></Field>
            </div>
            <div className="fgrid2">
              <Field label="金額"><input className="inp" type="number" inputMode="decimal" placeholder="例如 10000" value={form.amount} onChange={(e) => setF("amount", e.target.value)} /></Field>
              <Field label="貨幣"><CurSelect value={form.currency} onChange={(v) => setF("currency", v)} /></Field>
            </div>
            <div className="fgrid2">
              <Field label="日期"><input className="inp" type="date" value={form.date} onChange={(e) => setF("date", e.target.value)} /></Field>
              <Field label="備註" hint="例如:股票提現、轉去澳門"><input className="inp" placeholder="(選填)" value={form.note} onChange={(e) => setF("note", e.target.value)} /></Field>
            </div>
            <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.muted }}>轉賬只是把錢從一個帳戶搬到另一個,不會被當成收入或支出。系統會自動把兩邊帳戶的餘額加減好(跨幣別用目前匯率換算);股票市值有變動時,直接編輯該帳戶的餘額即可。</div>
          </>)}
        </Modal>
      )}
    </div>
  );
}

const _rootEl = document.getElementById("root");
createRoot(_rootEl).render(<App />);

</script>
</body>
</html>
